name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install ruff pytest httpx fastapi pydantic python-multipart pillow numpy pandas pyarrow scipy statsmodels
      - name: Lint
        run: ruff check src tests eval
      - name: Test
        run: pytest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t y2-health-nutrition .
